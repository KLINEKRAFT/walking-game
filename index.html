<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Walking Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas { display: block; width: 100vw; height: 100vh; }
  #hint {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.08);
    color: #555;
    padding: 10px 22px;
    border-radius: 30px;
    font-size: 13px;
    letter-spacing: 0.08em;
    pointer-events: none;
    transition: opacity 0.6s;
    white-space: nowrap;
    font-family: 'Courier New', monospace;
  }
  #hint.hidden { opacity: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">TAP &amp; HOLD to walk · RELEASE to stop</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const hint   = document.getElementById('hint');

// --- Exact sprite frame data (from pixel analysis) ---
// Source image: 1429 x 803, RGBA
// Content rows: 156 to 659  (height 503)
// 5 frames starting at x=199, each ~201px wide
const SRC_FRAMES = [
  { sx: 199, sy: 156, sw: 201, sh: 503 },
  { sx: 400, sy: 156, sw: 201, sh: 503 },
  { sx: 601, sy: 156, sw: 202, sh: 503 },
  { sx: 803, sy: 156, sw: 201, sh: 503 },
  { sx:1004, sy: 156, sw: 202, sh: 503 },
];
const FRAME_COUNT = SRC_FRAMES.length;

const SPEED         = 3;
const SCALE         = 0.42;
const FPS           = 10;
const MS_PER_FRAME  = 1000 / FPS;
const GROUND_RATIO  = 0.78;

let canvasW, canvasH, charH, charW, x, y;
let isWalking = false;
let frame = 0, frameTimer = 0, lastTime = 0;

function resize() {
  canvasW = canvas.width  = window.innerWidth;
  canvasH = canvas.height = window.innerHeight;
  charH = canvasH * SCALE;
  charW = charH * (SRC_FRAMES[0].sw / SRC_FRAMES[0].sh);
  y = canvasH * GROUND_RATIO - charH * 0.5;
  if (x === undefined) x = canvasW * 0.25;
}

function drawShadow(cx, cy, dw) {
  ctx.save();
  ctx.translate(cx, cy + charH * 0.5);
  ctx.scale(1, 0.25);
  const g = ctx.createRadialGradient(0, 0, 2, 0, 0, dw * 0.5);
  g.addColorStop(0, 'rgba(0,0,0,0.18)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(0, 0, dw * 0.5, charH * 0.08, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

const sprite = new Image();
sprite.src = 'walking.PNG';

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = ts - lastTime;
  lastTime = ts;

  if (isWalking) {
    frameTimer += dt;
    if (frameTimer >= MS_PER_FRAME) {
      frame = (frame + 1) % FRAME_COUNT;
      frameTimer = 0;
    }
    x += SPEED;
    if (x > canvasW + charW) x = -charW;
  }

  ctx.clearRect(0, 0, canvasW, canvasH);

  // Subtle ground line
  const gy = y + charH * 0.52;
  const lg = ctx.createLinearGradient(0, 0, canvasW, 0);
  lg.addColorStop(0,   'rgba(200,200,200,0)');
  lg.addColorStop(0.2, 'rgba(200,200,200,0.4)');
  lg.addColorStop(0.8, 'rgba(200,200,200,0.4)');
  lg.addColorStop(1,   'rgba(200,200,200,0)');
  ctx.strokeStyle = lg;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, gy);
  ctx.lineTo(canvasW, gy);
  ctx.stroke();

  if (sprite.complete && sprite.naturalWidth > 0) {
    const f  = SRC_FRAMES[frame];
    const dw = charH * (f.sw / f.sh);
    const dx = x - dw * 0.5;

    drawShadow(x, y, dw);
    ctx.drawImage(sprite, f.sx, f.sy, f.sw, f.sh, dx, y, dw, charH);
  }
}

// Input
function startWalk() { isWalking = true;  hint.classList.add('hidden'); }
function stopWalk()  { isWalking = false; frame = 0; frameTimer = 0; }

canvas.addEventListener('touchstart',  e => { e.preventDefault(); startWalk(); }, { passive: false });
canvas.addEventListener('touchend',    e => { e.preventDefault(); stopWalk();  }, { passive: false });
canvas.addEventListener('touchcancel', e => { e.preventDefault(); stopWalk();  }, { passive: false });
canvas.addEventListener('mousedown',  startWalk);
canvas.addEventListener('mouseup',    stopWalk);
canvas.addEventListener('mouseleave', stopWalk);
document.addEventListener('keydown',  e => { if (e.code === 'Space' || e.code === 'ArrowRight') startWalk(); });
document.addEventListener('keyup',    e => { if (e.code === 'Space' || e.code === 'ArrowRight') stopWalk();  });

window.addEventListener('resize', resize);
resize();
setTimeout(() => hint.classList.add('hidden'), 4000);
sprite.onload = () => requestAnimationFrame(loop);
</script>
</body>
</html>
